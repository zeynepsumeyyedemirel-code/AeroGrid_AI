version: '3.8'

services:
  aerogrid-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aerogrid_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./docs:/app/docs
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
